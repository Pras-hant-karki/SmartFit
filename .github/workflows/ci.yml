name: CI Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Dependency audit ──────────────────────────────────────────────────────
  audit-backend:
    name: Dependency Audit (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: Backend

  audit-frontends:
    name: Dependency Audit (Frontends)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [Frontend, Doctor, Admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.app }}

  # ── Static security scan ──────────────────────────────────────────────────
  semgrep:
    name: Static Security Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (OWASP + Node.js rules)
        run: >
          semgrep
          --config p/nodejs
          --config p/owasp-top-ten
          --config p/secrets
          --error
          --json
          --output semgrep-results.json
          Backend/src/
        continue-on-error: true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14

  # ── Docker build verification ─────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: false
          tags: smartfit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: false
          tags: smartfit-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Doctor image
        uses: docker/build-push-action@v5
        with:
          context: ./Doctor
          push: false
          tags: smartfit-doctor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin image
        uses: docker/build-push-action@v5
        with:
          context: ./Admin
          push: false
          tags: smartfit-admin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
